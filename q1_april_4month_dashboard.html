<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body { background:#0e0e0e; color:#ffffff; font-family:sans-serif; margin:0; padding:20px;}
  .db { padding-bottom:2rem; }
  .sec { font-size:13px; color:#aaa; margin:20px 0 10px; text-transform:uppercase;}
  .mg { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:10px;}
  .mc { background:#1c1c1c; border-radius:10px; padding:10px;}
  .ml { font-size:12px; color:#aaa;}
  .mv { font-size:20px; font-weight:bold;}
  .cw { height:260px; }
  canvas { background:#0e0e0e;}
</style>
</head>

<body>

<div class="db">

<div class="sec">Overview</div>
<div class="mg">
  <div class="mc"><div class="ml">Total</div><div class="mv">$159,361</div></div>
  <div class="mc"><div class="ml">Finn Thai</div><div class="mv">$103,563</div></div>
  <div class="mc"><div class="ml">Koyo</div><div class="mv">$55,796</div></div>
</div>

<div class="sec">Chart</div>
<div class="cw"><canvas id="c1"></canvas></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
new Chart(document.getElementById('c1'), {
  type:'bar',
  data:{
    labels:['Jan','Feb','Mar','Apr'],
    datasets:[
      {label:'Finn Thai', data:[25423,23656,26467,28018]},
      {label:'Koyo', data:[11240,13990,16243,14322]}
    ]
  }
});
</script>

</body>
</html>
